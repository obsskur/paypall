```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orion Wallet</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#0b0d13;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#121520;
padding:20px;
border-right:1px solid #23283a;
}

.logo{
font-size:18px;
font-weight:600;
margin-bottom:30px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu button{
background:none;
border:none;
color:#9aa0b5;
text-align:left;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.menu button:hover{
background:#1a1f30;
color:white;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 28px;
border-bottom:1px solid #23283a;
background:#10131d;
}

.balance{
font-size:28px;
font-weight:700;
}

.actions button{
background:#20263a;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
margin-left:10px;
cursor:pointer;
}

.actions button:hover{
background:#2b324c;
}

.content{
padding:28px;
}

.assets{
background:#151a27;
border-radius:14px;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
font-size:13px;
color:#9aa0b5;
padding-bottom:12px;
}

td{
padding:14px 0;
border-top:1px solid #23283a;
}

.coin{
display:flex;
align-items:center;
gap:10px;
}

.icon{
width:30px;

border-radius:50%;

align-items:center;
justify-content:center;

}

.btc{background:linear-gradient(140deg,#f7931a,#ffbf66);}
.eth{background:linear-gradient(140deg,#627eea,#8fa2ff);}
.sol{background:linear-gradient(140deg,#00ffa3,#00d4ff);}

.positive{color:#2ecc71;}
.negative{color:#e74c3c;}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">Orion Wallet</div>

<div class="menu">
<button>Wallet</button>
<button>Portfolio</button>
<button>Market</button>
<button>Transactions</button>
<button>Security</button>
<button>Settings</button>
</div>
</div>

<div class="main">

<div class="topbar">
<div class="balance" id="portfolio">$0</div>

<div class="actions">
<button>Send</button>
<button>Receive</button>
<button>Swap</button>
</div>
</div>

<div class="content">

<div class="assets">

<h3>Assets</h3>

<table>

<tr>
<th>Asset</th>
<th>Balance</th>
<th>Price</th>
<th>Value</th>
<th>24h</th>
</tr>

<tr>
<td class="coin">
<div class="icon btc">₿</div>Bitcoin
</td>
<td id="btcBal">0.214</td>
<td id="btcPrice">-</td>
<td id="btcValue">-</td>
<td id="btcChange">-</td>
</tr>

<tr>
<td class="coin">
<div class="icon eth">Ξ</div>Ethereum
</td>
<td id="ethBal">2.41</td>
<td id="ethPrice">-</td>
<td id="ethValue">-</td>
<td id="ethChange">-</td>
</tr>

<tr>
<td class="coin">
<div class="icon sol">S</div>Solana
</td>
<td id="solBal">18.5</td>
<td id="solPrice">-</td>
<td id="solValue">-</td>
<td id="solChange">-</td>
</tr>

</table>

</div>

</div>

</div>

<script>

async function loadPrices(){

let url="https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd&include_24hr_change=true";

let res=await fetch(url);
let data=await res.json();

let btc=data.bitcoin.usd;
let eth=data.ethereum.usd;
let sol=data.solana.usd;

let btcBal=0.214;
let ethBal=2.41;
let solBal=18.5;

let btcVal=btcBal*btc;
let ethVal=ethBal*eth;
let solVal=solBal*sol;

document.getElementById("btcPrice").innerText="$"+btc.toLocaleString();
document.getElementById("ethPrice").innerText="$"+eth.toLocaleString();
document.getElementById("solPrice").innerText="$"+sol.toLocaleString();

document.getElementById("btcValue").innerText="$"+btcVal.toLocaleString();
document.getElementById("ethValue").innerText="$"+ethVal.toLocaleString();
document.getElementById("solValue").innerText="$"+solVal.toLocaleString();

let btcChange=data.bitcoin.usd_24h_change.toFixed(2);
let ethChange=data.ethereum.usd_24h_change.toFixed(2);
let solChange=data.solana.usd_24h_change.toFixed(2);

let btcEl=document.getElementById("btcChange");
btcEl.innerText=btcChange+"%";
btcEl.className=btcChange>0?"positive":"negative";

let ethEl=document.getElementById("ethChange");
ethEl.innerText=ethChange+"%";
ethEl.className=ethChange>0?"positive":"negative";

let solEl=document.getElementById("solChange");
solEl.innerText=solChange+"%";
solEl.className=solChange>0?"positive":"negative";

let total=btcVal+ethVal+solVal;

document.getElementById("portfolio").innerText="$"+total.toLocaleString();

}

loadPrices();

</script>

</body>
</html>
