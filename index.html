<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION // APEX TERMINAL</title>
    
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #06080a; --surface: #0e1117; --sub: #161a22;
            --border: rgba(255,255,255,0.06); --accent: #fcd535;
            --pos: #0ecb81; --neg: #f6465d; --text: #f0f1f2; --dim: #707a8a;
            --radius: 6px; --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
            height: 100vh; overflow: hidden; display: flex;
        }

        /* Nav Sidebar */
        .sidebar {
            width: 56px; background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 20px;
        }
        .nav-link {
            color: var(--dim); cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-link:hover, .nav-link.active { color: var(--accent); background: var(--sub); }

        /* Workspace Grid */
        .app-shell { flex: 1; display: flex; flex-direction: column; }
        header {
            height: 44px; background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 16px; gap: 24px;
        }
        .workspace {
            flex: 1; display: grid; grid-template-columns: 280px 1fr 280px;
            grid-template-rows: 1fr 300px; background: var(--border); gap: 1px;
        }
        .panel { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
        
        /* Tabs System */
        .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 8px; }
        .tab { 
            padding: 10px 16px; font-size: 10px; font-weight: 700; color: var(--dim); cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.5px; position: relative;
        }
        .tab.active { color: var(--text); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: var(--accent); }

        /* Order Book kinetic depth */
        .ob-row { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 2px 12px; 
            font-family: var(--font-mono); font-size: 11px; position: relative; transition: background 0.1s;
        }
        .ob-depth { position: absolute; right: 0; height: 100%; opacity: 0.12; transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Execution & Allocation */
        .alloc-card { 
            padding: 16px; background: var(--surface); margin: 12px; border-radius: var(--radius);
            display: flex; align-items: center; gap: 16px; border: 1px solid var(--border);
        }
        .donut-box { width: 48px; height: 48px; position: relative; }
        .donut-box svg { transform: rotate(-90deg); }

        /* Markets & Moover List */
        .market-row { 
            padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; font-size: 12px;
            transition: 0.2s;
        }
        .market-row:hover { background: var(--sub); }
        .market-row.active { background: rgba(252, 213, 53, 0.03); border-left: 3px solid var(--accent); }

        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 10px; color: var(--dim); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 12px; font-size: 12px; font-family: var(--font-mono); }

        .btn { border: none; padding: 12px; border-radius: var(--radius); font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-buy { background: var(--pos); color: #000; }
        .btn-sell { background: var(--neg); color: #fff; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--sub); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="nav-link active" data-lucide="layers"></div>
        <div class="nav-link" data-lucide="bar-chart-3"></div>
        <div class="nav-link" data-lucide="shield"></div>
        <div style="flex:1"></div>
        <div class="nav-link" data-lucide="settings"></div>
    </nav>

    <div class="app-shell">
        <header>
            <div style="font-weight:900; letter-spacing:1px; font-size:13px; display:flex; align-items:center; gap:8px;">
                <div style="width:10px; height:10px; background:var(--accent); border-radius:2px;"></div> ORION APEX
            </div>
            <div id="top-ticker" style="display:flex; gap:24px; font-size:11px;">
                </div>
            <div style="flex:1"></div>
            <div style="font-size:10px; color:var(--dim); font-family:var(--font-mono)" id="utc-clock">00:00:00 UTC</div>
        </header>

        <main class="workspace">
            <div class="panel">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('markets')">Markets</div>
                    <div class="tab" onclick="switchTab('insights')">Insights</div>
                </div>
                <div id="market-view" style="overflow-y:auto; flex:1;"></div>
                <div id="insight-view" style="display:none; padding:16px;">
                    <h4 style="font-size:10px; color:var(--dim); margin-bottom:12px;">24H GAINERS</h4>
                    <div id="gainers-list"></div>
                </div>
            </div>

            <div class="panel" style="grid-column: 2/3;">
                <div id="tv_apex" style="flex:1"></div>
            </div>

            <div class="panel" style="border-left:1px solid var(--border)">
                <div class="tabs"><div class="tab active">Order Book</div></div>
                <div id="asks" style="display:flex; flex-direction:column-reverse; flex:1; overflow:hidden;"></div>
                <div id="mark-box" style="padding:16px; text-align:center; font-size:20px; font-weight:800; font-family:var(--font-mono); background:var(--surface);">---</div>
                <div id="bids" style="flex:1; overflow:hidden;"></div>
            </div>

            <div class="panel" style="grid-column: 1/3; border-top:1px solid var(--border)">
                <div class="tabs">
                    <div class="tab active">Open Positions <span id="pos-count" style="color:var(--accent)">(0)</span></div>
                </div>
                <div style="overflow-y:auto;">
                    <table>
                        <thead>
                            <tr><th>Market</th><th>Side</th><th>Size</th><th>Entry</th><th>Mark</th><th>ROE%</th><th></th></tr>
                        </thead>
                        <tbody id="pos-table"></tbody>
                    </table>
                </div>
            </div>

            <div class="panel" style="border-left:1px solid var(--border); border-top:1px solid var(--border)">
                <div class="alloc-card">
                    <div class="donut-box">
                        <svg width="48" height="48">
                            <circle cx="24" cy="24" r="20" fill="none" stroke="var(--sub)" stroke-width="5"/>
                            <circle id="alloc-ring" cx="24" cy="24" r="20" fill="none" stroke="var(--accent)" stroke-width="5" stroke-dasharray="125.6" stroke-dashoffset="125.6" style="transition:0.8s;"/>
                        </svg>
                    </div>
                    <div>
                        <div style="font-size:10px; color:var(--dim)">TOTAL EQUITY</div>
                        <div id="total-equity" style="font-size:16px; font-weight:800; font-family:var(--font-mono)">$32,509.54</div>
                    </div>
                </div>
                <div style="padding:0 16px 16px 16px; display:flex; flex-direction:column; gap:16px;">
                    <div style="background:var(--sub); padding:10px; border-radius:4px;">
                        <input type="number" id="trade-qty" placeholder="Quantity" style="background:transparent; border:none; color:#fff; width:100%; font-family:var(--font-mono)">
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:10px;">
                        <label>LEVERAGE</label><span id="lev-val" style="color:var(--accent)">20x</span>
                    </div>
                    <input type="range" id="lev-range" min="1" max="100" value="20" style="accent-color:var(--accent); width:100%;">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                        <button class="btn btn-buy" onclick="exec('long')">Long</button>
                        <button class="btn btn-sell" onclick="exec('short')">Short</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

<script>
    // --- ENGINE STATE ---
    let state = JSON.parse(localStorage.getItem('apex_v6')) || {
        wallet: 32509.54,
        positions: [],
        active: 'BTCUSDT'
    };
    
    let prices = {};
    const assets = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT', 'XRPUSDT', 'LINKUSDT', 'DOGEUSDT', 'PEPEUSDT'];

    // --- WEBSOCKETS ---
    function init() {
        const stream = assets.map(s => s.toLowerCase() + '@ticker').join('/');
        const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${stream}`);
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            prices[d.s] = { p: parseFloat(d.c), change: parseFloat(d.P) };
            if(d.s === state.active) updateHeader(d);
            renderMarkets();
            updateEngine();
        };
    }

    function updateHeader(d) {
        const price = parseFloat(d.c).toFixed(2);
        document.getElementById('mark-box').innerText = price;
        document.getElementById('top-ticker').innerHTML = `
            <div><span style="color:var(--dim)">PRICE</span> <b style="font-family:var(--font-mono)">${price}</b></div>
            <div><span style="color:var(--dim)">24H</span> <b style="color:${d.P>=0?'var(--pos)':'var(--neg)'}">${d.P}%</b></div>
            <div><span style="color:var(--dim)">HIGH</span> <b style="font-family:var(--font-mono)">${parseFloat(d.h).toFixed(2)}</b></div>
        `;
        renderOrderBook(parseFloat(d.c));
    }

    // --- CORE LOGIC ---
    function exec(side) {
        const qty = parseFloat(document.getElementById('trade-qty').value);
        const lev = parseInt(document.getElementById('lev-range').value);
        const price = prices[state.active].p;
        if(!qty) return;

        state.positions.push({ id: Date.now(), sym: state.active, side, qty, lev, entry: price });
        document.getElementById('trade-qty').value = '';
        save();
    }

    function updateEngine() {
        let totalUpnl = 0;
        let marginUsed = 0;
        const tbody = document.getElementById('pos-table');
        tbody.innerHTML = '';

        state.positions.forEach(p => {
            const mark = prices[p.sym]?.p || p.entry;
            const pnl = p.side === 'long' ? (mark - p.entry) * p.qty : (p.entry - mark) * p.qty;
            const margin = (p.qty * p.entry) / p.lev;
            const roe = ((pnl / margin) * 100).toFixed(2);
            
            totalUpnl += pnl;
            marginUsed += margin;

            tbody.innerHTML += `
                <tr>
                    <td style="font-weight:700">${p.sym} <span style="font-size:9px; color:var(--dim)">${p.lev}x</span></td>
                    <td style="color:${p.side==='long'?'var(--pos)':'var(--neg)'}">${p.side.toUpperCase()}</td>
                    <td>${p.qty}</td>
                    <td>${p.entry.toFixed(2)}</td>
                    <td style="color:${pnl>=0?'var(--pos)':'var(--neg)'}">${mark.toFixed(2)}</td>
                    <td style="color:${pnl>=0?'var(--pos)':'var(--neg)'}">${roe}%</td>
                    <td><button onclick="closePos(${p.id})" style="color:var(--dim); background:none; border:none; cursor:pointer">×</button></td>
                </tr>
            `;
        });

        const equity = state.wallet + totalUpnl;
        document.getElementById('total-equity').innerText = '$' + equity.toLocaleString(undefined, {minimumFractionDigits:2});
        document.getElementById('pos-count').innerText = `(${state.positions.length})`;

        // Allocation Donut Logic
        const ratio = (marginUsed / equity);
        const offset = 125.6 - (125.6 * ratio);
        const ring = document.getElementById('alloc-ring');
        ring.setAttribute('stroke-dashoffset', offset);
        ring.setAttribute('stroke', ratio > 0.7 ? 'var(--neg)' : 'var(--accent)');
    }

    function closePos(id) {
        const p = state.positions.find(x => x.id === id);
        const mark = prices[p.sym].p;
        state.wallet += p.side === 'long' ? (mark - p.entry) * p.qty : (p.entry - mark) * p.qty;
        state.positions = state.positions.filter(x => x.id !== id);
        save();
    }

    // --- UI RENDERERS ---
    function renderMarkets() {
        const view = document.getElementById('market-view');
        if(view.children.length === 0) {
            assets.forEach(a => {
                const div = document.createElement('div');
                div.className = `market-row ${a === state.active ? 'active' : ''}`;
                div.id = `row-${a}`;
                div.onclick = () => setPair(a);
                view.appendChild(div);
            });
        }
        assets.forEach(a => {
            if(prices[a]) {
                const row = document.getElementById(`row-${a}`);
                row.innerHTML = `<span>${a.replace('USDT','')}</span><div style="text-align:right"><div style="font-family:var(--font-mono)">${prices[a].p.toFixed(2)}</div><div style="font-size:10px; color:${prices[a].change>=0?'var(--pos)':'var(--neg)'}">${prices[a].change}%</div></div>`;
            }
        });
    }

    function renderOrderBook(p) {
        const a = document.getElementById('asks'); const b = document.getElementById('bids');
        a.innerHTML = ''; b.innerHTML = '';
        for(let i=0; i<12; i++) {
            const askD = Math.random() * 90; const bidD = Math.random() * 90;
            a.innerHTML += `<div class="ob-row"><div class="ob-depth" style="width:${askD}%; background:var(--neg)"></div><span style="color:var(--neg)">${(p+(i*0.45)).toFixed(2)}</span><span style="text-align:right">${(Math.random()*1.2).toFixed(3)}</span><span style="text-align:right; color:var(--dim)">${(Math.random()*5).toFixed(1)}K</span></div>`;
            b.innerHTML += `<div class="ob-row"><div class="ob-depth" style="width:${bidD}%; background:var(--pos)"></div><span style="color:var(--pos)">${(p-(i*0.45)).toFixed(2)}</span><span style="text-align:right">${(Math.random()*1.2).toFixed(3)}</span><span style="text-align:right; color:var(--dim)">${(Math.random()*5).toFixed(1)}K</span></div>`;
        }
    }

    function setPair(a) {
        state.active = a;
        document.querySelectorAll('.market-row').forEach(r => r.classList.remove('active'));
        document.getElementById(`row-${a}`).classList.add('active');
        new TradingView.widget({
            "container_id": "tv_apex", "autosize": true, "symbol": "BINANCE:"+a, "interval": "5",
            "theme": "dark", "style": "1", "toolbar_bg": "#0e1117", "backgroundColor": "#06080a",
            "studies": ["EMA@tv-basicstudies", "EMA@tv-basicstudies", "Volume@tv-basicstudies"]
        });
        save();
    }

    function save() { localStorage.setItem('apex_v6', JSON.stringify(state)); }
    function switchTab(t) { 
        document.getElementById('market-view').style.display = t === 'markets' ? 'block' : 'none';
        document.getElementById('insight-view').style.display = t === 'insights' ? 'block' : 'none';
    }

    lucide.createIcons();
    setPair(state.active);
    init();
    setInterval(() => document.getElementById('utc-clock').innerText = new Date().toISOString().split('T')[1].split('.')[0] + ' UTC', 1000);
    document.getElementById('lev-range').oninput = (e) => document.getElementById('lev-val').innerText = e.target.value + 'x';
</script>
</body>
</html>
