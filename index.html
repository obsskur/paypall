<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION // Terminal v2.0</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050608;
            --panel: rgba(18, 22, 33, 0.7);
            --accent: #3d7eff;
            --accent-glow: rgba(61, 126, 255, 0.4);
            --pos: #00ffaa;
            --neg: #ff3e3e;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e1e1e6;
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a233a 0%, #050608 60%);
        }

        /* Sidebar Glassmorphism */
        .sidebar {
            width: 280px;
            background: var(--panel);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .logo {
            padding: 40px 30px;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .logo span { color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }

        .nav-group { padding: 0 15px; flex: 1; }

        .nav-btn {
            width: 100%;
            background: transparent;
            border: none;
            color: #666;
            padding: 14px 20px;
            text-align: left;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.03); color: #fff; }

        .nav-btn.active {
            background: rgba(61, 126, 255, 0.1);
            color: var(--accent);
            box-shadow: inset 0 0 0 1px var(--accent);
        }

        /* Main Viewport */
        .viewport { flex: 1; display: flex; flex-direction: column; position: relative; }

        .top-nav {
            height: 100px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .stats-display { display: flex; gap: 40px; }
        .stat-item label { display: block; font-size: 11px; text-transform: uppercase; color: #666; letter-spacing: 1px; }
        .stat-item span { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }

        .content-area { padding: 40px; overflow-y: auto; height: calc(100vh - 100px); }

        /* Premium Cards */
        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-content { animation: slideUp 0.4s ease forwards; }

        .price-up { color: var(--pos) !important; text-shadow: 0 0 10px rgba(0, 255, 170, 0.2); }
        .price-down { color: var(--neg) !important; text-shadow: 0 0 10px rgba(255, 62, 62, 0.2); }

        /* Tables & Inputs */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #444; font-size: 12px; padding-bottom: 15px; }
        td { padding: 18px 0; border-top: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }

        .btn-trade {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-trade:active { transform: scale(0.96); }

        .input-dark {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-family: 'JetBrains Mono';
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">ORION<span>//TERMINAL</span></div>
    <div class="nav-group">
        <button class="nav-btn active" onclick="switchTab('dashboard', this)">
            <i>▣</i> Dashboard
        </button>
        <button class="nav-btn" onclick="switchTab('exchange', this)">
            <i>◈</i> Exchange
        </button>
        <button class="nav-btn" onclick="switchTab('market', this)">
            <i>📈</i> Market
        </button>
    </div>
    <div style="padding: 20px; border-top: 1px solid var(--border)">
        <div class="stat-item">
            <label>Connection</label>
            <span id="ws-status" style="font-size: 12px; color: var(--pos)">● LIVE WEBSOCKET</span>
        </div>
    </div>
</aside>

<main class="viewport">
    <header class="top-nav">
        <div class="stats-display">
            <div class="stat-item">
                <label>Total Net Worth</label>
                <span id="total-val">$0.00</span>
            </div>
            <div class="stat-item">
                <label>Buying Power</label>
                <span id="cash-val" style="color: #aaa;">$100,000.00</span>
            </div>
        </div>
        <div class="stat-item" style="text-align: right;">
            <label>Current UTC</label>
            <span id="clock" style="font-size: 14px;">00:00:00</span>
        </div>
    </header>

    <div class="content-area">
        <div id="dashboard" class="tab-content">
            <div class="card">
                <h3 style="margin:0">Active Positions</h3>
                <table id="portfolio-table">
                    <thead>
                        <tr><th>Asset</th><th>Balance</th><th>Entry</th><th>Market Price</th><th>Unrealized P/L</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="exchange" class="tab-content hidden">
            <div style="display: grid; grid-template-columns: 1fr 350px; gap: 30px;">
                <div class="card">
                    <div id="tradingview_chart" style="height: 500px;"></div>
                </div>
                <div class="card">
                    <h3>Terminal Order</h3>
                    <div style="display: flex; flex-direction: column; gap: 20px;">
                        <div>
                            <label style="font-size: 12px; color: #666;">Instrument</label>
                            <select id="trade-coin" class="input-dark" style="width:100%; margin-top:5px;">
                                <option value="bitcoin">Bitcoin / USDT</option>
                                <option value="ethereum">Ethereum / USDT</option>
                                <option value="solana">Solana / USDT</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 12px; color: #666;">Size</label>
                            <input type="number" id="trade-amt" class="input-dark" style="width:100%; margin-top:5px;" placeholder="0.00">
                        </div>
                        <button class="btn-trade" onclick="handleTrade('buy')">Execute Buy</button>
                        <button class="btn-trade" style="background: transparent; border: 1px solid var(--neg); color: var(--neg); box-shadow: none;" onclick="handleTrade('sell')">Liquidate</button>
                    </div>
                    <div style="margin-top: 30px;">
                        <label style="font-size: 11px; color: #444;">FEE RATE: 0.1%</label>
                    </div>
                </div>
            </div>
        </div>

        <div id="market" class="tab-content hidden">
            <div class="card">
                <h3>Global Market (Top 50)</h3>
                <table id="market-table">
                    <thead>
                        <tr><th>#</th><th>Asset</th><th>Price</th><th>24h %</th><th>Volume</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script>
    // --- STATE & ENGINE ---
    let engine = {
        cash: 100000,
        portfolio: JSON.parse(localStorage.getItem('orion_assets')) || {
            'bitcoin': { amt: 0.5, entry: 45000 },
            'ethereum': { amt: 2.5, entry: 2400 }
        },
        prices: { bitcoin: 0, ethereum: 0, solana: 0 },
        prevPrices: {}
    };

    const currency = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });

    // --- REALTIME SOCKET ---
    function initStream() {
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade/ethusdt@trade/solusdt@trade');
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const map = { 'BTCUSDT': 'bitcoin', 'ETHUSDT': 'ethereum', 'SOLUSDT': 'solana' };
            const coin = map[d.s];
            engine.prevPrices[coin] = engine.prices[coin];
            engine.prices[coin] = parseFloat(d.p);
            refreshUI();
        };
    }

    function refreshUI() {
        document.getElementById('cash-val').innerText = currency.format(engine.cash);
        let net = engine.cash;
        
        const tbody = document.querySelector('#portfolio-table tbody');
        tbody.innerHTML = '';

        for (const [id, data] of Object.entries(engine.portfolio)) {
            const price = engine.prices[id] || data.entry;
            const val = data.amt * price;
            net += val;

            const pl = val - (data.amt * data.entry);
            const moveClass = price > engine.prevPrices[id] ? 'price-up' : 'price-down';

            tbody.innerHTML += `
                <tr>
                    <td style="text-transform: capitalize; font-weight:700">${id}</td>
                    <td>${data.amt.toFixed(4)}</td>
                    <td>${currency.format(data.entry)}</td>
                    <td class="${moveClass}">${currency.format(price)}</td>
                    <td style="color: ${pl >= 0 ? 'var(--pos)' : 'var(--neg)'}">${currency.format(pl)}</td>
                </tr>
            `;
        }
        document.getElementById('total-val').innerText = currency.format(net);
    }

    // --- SYSTEMS ---
    function switchTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        el.classList.add('active');
        if(id === 'market') loadMarketData();
    }

    async function loadMarketData() {
        const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=50');
        const data = await res.json();
        const tbody = document.querySelector('#market-table tbody');
        tbody.innerHTML = data.map(c => `
            <tr>
                <td>${c.market_cap_rank}</td>
                <td>${c.name}</td>
                <td>${currency.format(c.current_price)}</td>
                <td style="color: ${c.price_change_percentage_24h >= 0 ? 'var(--pos)' : 'var(--neg)'}">${c.price_change_percentage_24h.toFixed(2)}%</td>
                <td style="color:#666">${currency.format(c.total_volume)}</td>
            </tr>
        `).join('');
    }

    function handleTrade(type) {
        const coin = document.getElementById('trade-coin').value;
        const amt = parseFloat(document.getElementById('trade-amt').value);
        const price = engine.prices[coin];

        if(!amt || !price) return;

        const total = amt * price;
        const fee = total * 0.001;

        if(type === 'buy') {
            if(engine.cash < (total + fee)) return alert("INSUFFICIENT FUNDS");
            engine.cash -= (total + fee);
            if(!engine.portfolio[coin]) engine.portfolio[coin] = { amt: 0, entry: 0 };
            
            // Average entry price logic
            const oldVal = engine.portfolio[coin].amt * engine.portfolio[coin].entry;
            engine.portfolio[coin].amt += amt;
            engine.portfolio[coin].entry = (oldVal + total) / engine.portfolio[coin].amt;
        } else {
            if(!engine.portfolio[coin] || engine.portfolio[coin].amt < amt) return alert("INSUFFICIENT ASSETS");
            engine.cash += (total - fee);
            engine.portfolio[coin].amt -= amt;
            if(engine.portfolio[coin].amt <= 0) delete engine.portfolio[coin];
        }

        localStorage.setItem('orion_assets', JSON.stringify(engine.portfolio));
        document.getElementById('trade-amt').value = '';
        refreshUI();
    }

    // --- INIT ---
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toUTCString().split(' ')[4];
    }, 1000);

    new TradingView.widget({
        "container_id": "tradingview_chart",
        "autosize": true,
        "symbol": "BINANCE:BTCUSDT",
        "interval": "D",
        "theme": "dark",
        "style": "1",
        "backgroundColor": "rgba(5, 6, 8, 1)",
        "gridColor": "rgba(255, 255, 255, 0.05)",
        "hide_side_toolbar": false
    });

    initStream();
</script>
</body>
</html>
