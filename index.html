<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION // APEX v6.1</title>
    
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #06080a; --surface: #0e1117; --sub: #161a22;
            --border: rgba(255,255,255,0.06); --accent: #fcd535;
            --pos: #0ecb81; --neg: #f6465d; --text: #f0f1f2; --dim: #707a8a;
            --radius: 6px; --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
            height: 100vh; overflow: hidden; display: flex;
        }

        .sidebar {
            width: 56px; background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 20px;
        }
        .nav-link { color: var(--dim); cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; }
        .nav-link.active { color: var(--accent); background: var(--sub); }

        .app-shell { flex: 1; display: flex; flex-direction: column; }
        header { height: 44px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 24px; }
        
        .workspace {
            flex: 1; display: grid; grid-template-columns: 260px 1fr 300px;
            grid-template-rows: 1fr 240px; background: var(--border); gap: 1px;
        }
        .panel { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
        
        .p-head { padding: 8px 12px; background: var(--surface); font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; border-bottom: 1px solid var(--border); }

        /* Order Book */
        .ob-row { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 2px 12px; font-family: var(--font-mono); font-size: 11px; position: relative; }
        .ob-depth { position: absolute; right: 0; height: 100%; opacity: 0.12; transition: width 0.4s; }
        .ob-mid { padding: 10px; text-align: center; font-size: 18px; font-weight: 800; font-family: var(--font-mono); background: var(--surface); }

        /* Market List */
        .market-row { padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; font-size: 12px; transition: 0.2s; }
        .market-row:hover { background: var(--sub); }
        .market-row.active { border-left: 3px solid var(--accent); background: rgba(252, 213, 53, 0.05); }

        /* Trade Log Console */
        .log-entry { padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); font-family: var(--font-mono); font-size: 10px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        /* Execution Form */
        .exec-card { padding: 16px; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid var(--border); }
        .input-wrap { background: var(--sub); padding: 10px; border-radius: 4px; display: flex; align-items: center; }
        .input-wrap input { background: transparent; border: none; color: #fff; flex: 1; font-family: var(--font-mono); }

        .btn { border: none; padding: 12px; border-radius: var(--radius); font-weight: 800; cursor: pointer; }
        .btn-buy { background: var(--pos); color: #000; }
        .btn-sell { background: var(--neg); color: #fff; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; font-size: 10px; color: var(--dim); border-bottom: 1px solid var(--border); }
        td { padding: 10px; font-size: 11px; font-family: var(--font-mono); border-bottom: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="nav-link active" data-lucide="layout-grid"></div>
        <div class="nav-link" data-lucide="terminal"></div>
        <div class="nav-link" data-lucide="wallet"></div>
        <div style="flex:1"></div>
        <div class="nav-link" data-lucide="database"></div>
    </nav>

    <div class="app-shell">
        <header>
            <div style="font-weight:900; font-size:14px; letter-spacing:1px; color:var(--accent)">ORION <span style="color:#fff">APEX</span></div>
            <div id="h-ticker" style="display:flex; gap:20px; font-size:11px;"></div>
            <div style="flex:1"></div>
            <div id="utc-clock" style="font-size:10px; font-family:var(--font-mono); color:var(--dim)">00:00:00 UTC</div>
        </header>

        <main class="workspace">
            <div class="panel">
                <div class="p-head">Sovereign Markets</div>
                <div id="market-list" style="overflow-y:auto;"></div>
            </div>

            <div class="panel">
                <div id="tv_main" style="flex:1"></div>
            </div>

            <div class="panel" style="border-left:1px solid var(--border)">
                <div class="p-head">Live Orderbook</div>
                <div id="asks" style="display:flex; flex-direction:column-reverse; flex:1; overflow:hidden;"></div>
                <div class="ob-mid" id="mid-price">0.00</div>
                <div id="bids" style="flex:1; overflow:hidden;"></div>
                <div class="exec-card">
                    <div style="font-size:10px; color:var(--dim)">EQUITY: <span id="eq-val" style="color:#fff">$32,509.54</span></div>
                    <div class="input-wrap"><input type="number" id="trade-qty" placeholder="Size"><span id="qty-unit" style="font-size:10px; color:var(--dim)">BTC</span></div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                        <button class="btn btn-buy" onclick="trade('long')">Long</button>
                        <button class="btn btn-sell" onclick="trade('short')">Short</button>
                    </div>
                </div>
            </div>

            <div class="panel" style="grid-column: 1/3; border-top:1px solid var(--border)">
                <div class="p-head">Active Positions</div>
                <div style="overflow-y:auto;">
                    <table>
                        <thead><tr><th>Symbol</th><th>Side</th><th>Size</th><th>Entry</th><th>Mark</th><th>PNL</th><th>Action</th></tr></thead>
                        <tbody id="pos-table"></tbody>
                    </table>
                </div>
            </div>

            <div class="panel" style="border-top:1px solid var(--border); border-left:1px solid var(--border)">
                <div class="p-head">Execution Log</div>
                <div id="trade-log" style="overflow-y:auto; flex:1;"></div>
            </div>
        </main>
    </div>

<script>
    let state = {
        wallet: 32509.54,
        positions: [],
        active: 'BTCUSDT'
    };

    let prices = {};
    const markets = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT', 'XRPUSDT', 'LINKUSDT', 'PEPEUSDT'];

    // --- FIX: Proper Initialization Sequence ---
    window.onload = () => {
        lucide.createIcons();
        renderMarketShell(); // Create elements first
        setPair(state.active); // Then apply logic
        initWS();
        setInterval(updateClock, 1000);
    };

    function renderMarketShell() {
        const list = document.getElementById('market-list');
        list.innerHTML = '';
        markets.forEach(m => {
            const div = document.createElement('div');
            div.className = 'market-row';
            div.id = `row-${m}`;
            div.onclick = () => setPair(m);
            list.appendChild(div);
        });
    }

    function initWS() {
        const stream = markets.map(s => s.toLowerCase() + '@ticker').join('/');
        const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${stream}`);
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            prices[d.s] = { p: parseFloat(d.c), chg: d.P };
            updateUI(d);
        };
    }

    function updateUI(d) {
        // Update Market List Price
        const row = document.getElementById(`row-${d.s}`);
        if(row) {
            row.innerHTML = `<span>${d.s.replace('USDT','')}</span><div style="text-align:right"><div>${parseFloat(d.c).toFixed(d.s.includes('PEPE')?6:2)}</div><div style="font-size:10px; color:${d.P>=0?'var(--pos)':'var(--neg)'}">${d.P}%</div></div>`;
        }

        // Update Header & Book if active
        if(d.s === state.active) {
            document.getElementById('mid-price').innerText = parseFloat(d.c).toFixed(2);
            document.getElementById('h-ticker').innerHTML = `<span>MARKET: <b>${d.s}</b></span><span>PRICE: <b>${parseFloat(d.c).toFixed(2)}</b></span>`;
            renderBook(parseFloat(d.c));
        }
        updatePositions();
    }

    function setPair(m) {
        state.active = m;
        // Visual Update
        document.querySelectorAll('.market-row').forEach(r => r.classList.remove('active'));
        const activeRow = document.getElementById(`row-${m}`);
        if(activeRow) activeRow.classList.add('active');
        
        document.getElementById('qty-unit').innerText = m.replace('USDT','');

        // TV Chart
        new TradingView.widget({
            "container_id": "tv_main", "autosize": true, "symbol": "BINANCE:"+m, "interval": "1",
            "theme": "dark", "style": "1", "toolbar_bg": "#0e1117", "backgroundColor": "#06080a"
        });
    }

    function trade(side) {
        const qty = parseFloat(document.getElementById('trade-qty').value);
        const price = prices[state.active]?.p;
        if(!qty || !price) return;

        const pos = { id: Date.now(), sym: state.active, side, qty, entry: price };
        state.positions.push(pos);
        
        logTrade(`EXECUTED ${side.toUpperCase()} ${qty} ${state.active} @ ${price}`);
        document.getElementById('trade-qty').value = '';
    }

    function updatePositions() {
        let upnl = 0;
        const tbody = document.getElementById('pos-table');
        tbody.innerHTML = '';

        state.positions.forEach(p => {
            const mark = prices[p.sym]?.p || p.entry;
            const diff = p.side === 'long' ? (mark - p.entry) * p.qty : (p.entry - mark) * p.qty;
            upnl += diff;

            tbody.innerHTML += `<tr>
                <td>${p.sym}</td>
                <td style="color:${p.side==='long'?'var(--pos)':'var(--neg)'}">${p.side.toUpperCase()}</td>
                <td>${p.qty}</td>
                <td>${p.entry.toFixed(2)}</td>
                <td>${mark.toFixed(2)}</td>
                <td style="color:${diff>=0?'var(--pos)':'var(--neg)'}">$${diff.toFixed(2)}</td>
                <td><button onclick="closePos(${p.id})" style="color:var(--dim); background:none; border:none; cursor:pointer">CLOSE</button></td>
            </tr>`;
        });
        document.getElementById('eq-val').innerText = `$${(state.wallet + upnl).toLocaleString()}`;
    }

    function closePos(id) {
        const p = state.positions.find(x => x.id === id);
        const mark = prices[p.sym].p;
        const diff = p.side === 'long' ? (mark - p.entry) * p.qty : (p.entry - mark) * p.qty;
        state.wallet += diff;
        state.positions = state.positions.filter(x => x.id !== id);
        logTrade(`CLOSED ${p.sym} PNL: ${diff.toFixed(2)}`);
    }

    function renderBook(p) {
        const a = document.getElementById('asks'); const b = document.getElementById('bids');
        a.innerHTML = ''; b.innerHTML = '';
        for(let i=0; i<10; i++) {
            a.innerHTML += `<div class="ob-row"><div class="ob-depth" style="width:${Math.random()*100}%; background:var(--neg)"></div><span style="color:var(--neg)">${(p+(i*0.4)).toFixed(2)}</span><span style="text-align:right">${(Math.random()).toFixed(3)}</span><span style="text-align:right; color:var(--dim)">${(Math.random()*5).toFixed(1)}K</span></div>`;
            b.innerHTML += `<div class="ob-row"><div class="ob-depth" style="width:${Math.random()*100}%; background:var(--pos)"></div><span style="color:var(--pos)">${(p-(i*0.4)).toFixed(2)}</span><span style="text-align:right">${(Math.random()).toFixed(3)}</span><span style="text-align:right; color:var(--dim)">${(Math.random()*5).toFixed(1)}K</span></div>`;
        }
    }

    function logTrade(msg) {
        const log = document.getElementById('trade-log');
        const time = new Date().toLocaleTimeString();
        log.innerHTML = `<div class="log-entry"><span style="color:var(--dim)">[${time}]</span> ${msg}</div>` + log.innerHTML;
    }

    function updateClock() {
        document.getElementById('utc-clock').innerText = new Date().toISOString().split('T')[1].split('.')[0] + ' UTC';
    }
</script>
</body>
</html>
