```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orion Wallet Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#0b0d13;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#121520;
padding:20px;
border-right:1px solid #23283a;
}

.logo{
font-size:18px;
font-weight:600;
margin-bottom:25px;
}

.menu button{
width:100%;
background:none;
border:none;
color:#9aa0b5;
text-align:left;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:6px;
}

.menu button:hover{
background:#1a1f30;
color:white;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 28px;
border-bottom:1px solid #23283a;
background:#10131d;
}

.balance{
font-size:28px;
font-weight:700;
cursor:pointer;
}

.content{
padding:25px;
overflow:auto;
}

.card{
background:#151a27;
border-radius:14px;
padding:20px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:12px 0;
border-bottom:1px solid #23283a;
}

button{
background:#2b324c;
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.hidden{display:none;}

.lock{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b0d13;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.editable{
cursor:pointer;
}

</style>
</head>

<body>

<div id="lock" class="lock">
<h2>Unlock Wallet</h2>
<input type="password" id="pin" placeholder="Enter PIN">
<button onclick="unlock()">Unlock</button>
</div>

<div class="sidebar">

<div class="logo">Orion Wallet</div>

<div class="menu">
<button onclick="show('wallet')">Wallet</button>
<button onclick="show('send')">Send</button>
<button onclick="show('receive')">Receive</button>
<button onclick="show('transactions')">Transactions</button>
<button onclick="show('settings')">Settings</button>
</div>

</div>

<div class="main">

<div class="topbar">
<div class="balance" id="portfolio" onclick="editPortfolio()">$0</div>
</div>

<div class="content">

<div id="wallet">

<div class="card">
<h3>Portfolio Chart</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">

<table>

<tr>
<th>Asset</th>
<th>Balance</th>
<th>Price</th>
<th>Value</th>
</tr>

<tr>
<td>Bitcoin</td>
<td class="editable" onclick="editBalance('btc')"><span id="btcBal"></span></td>
<td id="btcPrice"></td>
<td id="btcVal"></td>
</tr>

<tr>
<td>Ethereum</td>
<td class="editable" onclick="editBalance('eth')"><span id="ethBal"></span></td>
<td id="ethPrice"></td>
<td id="ethVal"></td>
</tr>

<tr>
<td>Solana</td>
<td class="editable" onclick="editBalance('sol')"><span id="solBal"></span></td>
<td id="solPrice"></td>
<td id="solVal"></td>
</tr>

</table>

</div>
</div>

<div id="send" class="hidden">
<div class="card">
<h3>Send (Simulation)</h3>
<button onclick="fakeTx('Sent')">Simulate Send</button>
</div>
</div>

<div id="receive" class="hidden">
<div class="card">
<h3>Receive</h3>
<div id="qrcode"></div>
<p id="address"></p>
</div>
</div>

<div id="transactions" class="hidden">
<div class="card">
<h3>Transactions</h3>
<ul id="txlist"></ul>
</div>
</div>

<div id="settings" class="hidden">
<div class="card">
<button onclick="lock()">Lock Wallet</button>
</div>
</div>

</div>

</div>

<script>

let balances={
btc:localStorage.btc||0.214,
eth:localStorage.eth||2.41,
sol:localStorage.sol||18.5
};

let prices={};
let chart;

function unlock(){
if(document.getElementById("pin").value==="1234"){
document.getElementById("lock").style.display="none";
}
}

function lock(){
document.getElementById("lock").style.display="flex";
}

function show(id){
document.querySelectorAll(".content > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function fakeTx(type){
let li=document.createElement("li");
li.innerText=type+" at "+new Date().toLocaleString();
document.getElementById("txlist").appendChild(li);
}

function editBalance(asset){

let v=prompt("Enter new balance:");

if(v!==null){
balances[asset]=parseFloat(v);
localStorage[asset]=v;
updateValues();
}

}

function editPortfolio(){

let v=prompt("Enter new portfolio value (USD):");

if(!v) return;

let total=parseFloat(v);

let sum=prices.btc*balances.btc+prices.eth*balances.eth+prices.sol*balances.sol;

let ratio=total/sum;

balances.btc*=ratio;
balances.eth*=ratio;
balances.sol*=ratio;

updateValues();

}

function updateValues(){

document.getElementById("btcBal").innerText=balances.btc;
document.getElementById("ethBal").innerText=balances.eth;
document.getElementById("solBal").innerText=balances.sol;

let btcVal=balances.btc*prices.btc;
let ethVal=balances.eth*prices.eth;
let solVal=balances.sol*prices.sol;

document.getElementById("btcVal").innerText="$"+btcVal.toFixed(2);
document.getElementById("ethVal").innerText="$"+ethVal.toFixed(2);
document.getElementById("solVal").innerText="$"+solVal.toFixed(2);

let total=btcVal+ethVal+solVal;

document.getElementById("portfolio").innerText="$"+total.toFixed(2);

chart.data.datasets[0].data=[btcVal,ethVal,solVal];
chart.update();

}

async function loadPrices(){

let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd");
let d=await r.json();

prices.btc=d.bitcoin.usd;
prices.eth=d.ethereum.usd;
prices.sol=d.solana.usd;

document.getElementById("btcPrice").innerText="$"+prices.btc;
document.getElementById("ethPrice").innerText="$"+prices.eth;
document.getElementById("solPrice").innerText="$"+prices.sol;

updateValues();

}

function initChart(){

chart=new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{
labels:["BTC","ETH","SOL"],
datasets:[{data:[1,1,1]}]
}
});

}

function genAddress(){

let addr="bc1q"+Math.random().toString(36).substring(2,18);

document.getElementById("address").innerText=addr;

QRCode.toCanvas(addr,{width:180},function(err,canvas){
document.getElementById("qrcode").appendChild(canvas);
});

}

initChart();
genAddress();
loadPrices();

setInterval(loadPrices,30000);

</script>

</body>
</html>
```
