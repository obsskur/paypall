```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orion Wallet Desktop</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#0b0d13;
color:white;
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:220px;
background:#121520;
padding:20px;
border-right:1px solid #23283a;
}

.logo{
font-size:18px;
font-weight:600;
margin-bottom:30px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu button{
background:none;
border:none;
color:#9aa0b5;
text-align:left;
padding:10px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.menu button:hover{
background:#1a1f30;
color:white;
}

/* Main area */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* Top bar */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 28px;
border-bottom:1px solid #23283a;
background:#10131d;
}

.balance{
font-size:28px;
font-weight:700;
}

/* Content */

.content{
padding:28px;
display:grid;
grid-template-columns:2fr 1fr;
gap:24px;
}

/* Chart */

.chart-card{
background:#151a27;
border-radius:14px;
padding:20px;
}

.chart{
height:220px;
}

.chart svg{
width:100%;
height:100%;
}

/* Assets table */

.assets{
background:#151a27;
border-radius:14px;
padding:20px;
grid-column:span 2;
}

.assets table{
width:100%;
border-collapse:collapse;
}

.assets th{
text-align:left;
font-size:13px;
color:#9aa0b5;
padding-bottom:12px;
}

.assets td{
padding:14px 0;
border-top:1px solid #23283a;
}

.coin{
display:flex;
align-items:center;
gap:10px;
}

.coin-icon{
width:30px;
height:30px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.btc{background:linear-gradient(140deg,#f7931a,#ffbf66);}
.eth{background:linear-gradient(140deg,#627eea,#8fa2ff);}
.sol{background:linear-gradient(140deg,#00ffa3,#00d4ff);}

.positive{color:#2ecc71;}
.negative{color:#e74c3c;}

.action-bar{
display:flex;
gap:10px;
}

.action-bar button{
background:#20263a;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.action-bar button:hover{
background:#2b324c;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">Orion Wallet</div>

<div class="menu">
<button>Wallet</button>
<button>Portfolio</button>
<button>Exchange</button>
<button>Transactions</button>
<button>Security</button>
<button>Settings</button>
</div>

</div>

<div class="main">

<div class="topbar">
<div class="balance">$18,452.39</div>

<div class="action-bar">
<button>Send</button>
<button>Receive</button>
<button>Swap</button>
</div>
</div>

<div class="content">

<div class="chart-card">

<h3>Portfolio Performance</h3>

<div class="chart">

<svg viewBox="0 0 500 200" preserveAspectRatio="none">

<polyline
fill="none"
stroke="#7c8cff"
stroke-width="4"
points="0,150 80,140 140,120 200,130 260,90 320,100 380,60 440,70 500,40"
/>

</svg>

</div>

</div>

<div class="chart-card">

<h3>Portfolio Allocation</h3>

<p>BTC 70%</p>
<p>ETH 22%</p>
<p>SOL 8%</p>

</div>

<div class="assets">

<h3>Assets</h3>

<table>

<tr>
<th>Asset</th>
<th>Balance</th>
<th>Price</th>
<th>Value</th>
<th>24h</th>
</tr>

<tr>
<td class="coin">
<div class="coin-icon btc">₿</div>
Bitcoin
</td>
<td>0.214 BTC</td>
<td>$60,500</td>
<td>$12,940</td>
<td class="positive">+2.4%</td>
</tr>

<tr>
<td class="coin">
<div class="coin-icon eth">Ξ</div>
Ethereum
</td>
<td>2.41 ETH</td>
<td>$1,710</td>
<td>$4,120</td>
<td class="positive">+1.2%</td>
</tr>

<tr>
<td class="coin">
<div class="coin-icon sol">S</div>
Solana
</td>
<td>18.5 SOL</td>
<td>$75.2</td>
<td>$1,392</td>
<td class="positive">+5.7%</td>
</tr>

</table>

</div>

</div>

</div>

</body>
</html>
