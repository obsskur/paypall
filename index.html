<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION // SOVEREIGN V10.0</title>
    
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030406; --surface: #0a0c10; --sub: #12151b;
            --border: rgba(255,255,255,0.08); --accent: #fcd535;
            --pos: #0ecb81; --neg: #f6465d; --text: #eaecef; --dim: #707a8a;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; }

        nav { width: 56px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 20px; z-index: 100; }
        .nav-item { color: var(--dim); cursor: pointer; transition: 0.2s; padding: 10px; border-radius: 8px; background: transparent; border: none; display: flex; align-items: center; justify-content: center; }
        .nav-item:hover { color: var(--text); background: var(--sub); }
        .nav-item.active { color: var(--accent); background: rgba(252, 213, 53, 0.1); }

        .viewport { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        header { height: 40px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 25px; font-size: 11px; z-index: 10; }

        .trade-grid { flex: 1; display: grid; grid-template-columns: 240px 1fr 280px; grid-template-rows: 1fr 220px; gap: 1px; background: var(--border); overflow: hidden; }
        .panel { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
        .panel-h { padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 800; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Orderbook Styles */
        .ob-row { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 1px 12px; font-family: var(--font-mono); font-size: 10px; position: relative; }
        .ob-fill { position: absolute; right: 0; height: 100%; opacity: 0.12; transition: width 0.3s; pointer-events: none; }

        .m-row { padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; font-size: 12px; }
        .m-row:hover { background: var(--sub); }
        .m-row.active { background: rgba(252, 213, 53, 0.05); border-left: 2px solid var(--accent); }

        .exec-bar { padding: 12px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); background: var(--surface); }
        .btn { border: none; padding: 10px; border-radius: 4px; font-weight: 800; cursor: pointer; font-size: 11px; }
        .btn-buy { background: var(--pos); color: #000; }
        .btn-sell { background: var(--neg); color: #fff; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; font-size: 9px; color: var(--dim); border-bottom: 1px solid var(--border); }
        td { padding: 10px; font-size: 11px; font-family: var(--font-mono); border-bottom: 1px solid rgba(255,255,255,0.02); }

        #tv_frame { flex: 1; background: #000; }
        .view-section { display: none; flex: 1; height: 100%; }
        .view-section.active { display: flex; }
    </style>
</head>
<body>

    <nav>
        <button class="nav-item active" onclick="showSection('trade', this)"><i data-lucide="candlestick-chart"></i></button>
        <button class="nav-item" onclick="showSection('wallet', this)"><i data-lucide="wallet"></i></button>
        <button class="nav-item" onclick="showSection('security', this)"><i data-lucide="shield"></i></button>
        <div style="flex:1"></div>
        <button class="nav-item"><i data-lucide="settings"></i></button>
    </nav>

    <div class="viewport">
        <header>
            <div style="font-weight:900; color:var(--accent); letter-spacing:1px;">ORION V10</div>
            <div id="h-pair" style="font-family:var(--font-mono); font-weight:700">BTC/USDT</div>
            <div style="display:flex; gap:15px; color:var(--dim)">
                <span>24h Change <b id="h-change" style="color:var(--pos)">+0.00%</b></span>
                <span>Vol <b style="color:#fff">1.24B</b></span>
            </div>
            <div style="flex:1"></div>
            <div id="clock" style="font-family:var(--font-mono); color:var(--dim); font-size:10px;">00:00:00 UTC</div>
        </header>

        <section id="view-trade" class="view-section active">
            <div class="trade-grid">
                <div class="panel">
                    <div class="panel-h">Markets</div>
                    <div id="market-list" style="overflow-y:auto; flex: 1;"></div>
                </div>

                <div class="panel">
                    <div id="tv_frame"></div>
                </div>

                <div class="panel" style="border-left:1px solid var(--border)">
                    <div class="panel-h">Order Book</div>
                    <div id="asks" style="display:flex; flex-direction:column-reverse; flex:1; overflow:hidden"></div>
                    <div id="mid-price" style="padding:10px; text-align:center; font-family:var(--font-mono); font-size:16px; font-weight:800; background:var(--sub); border-top:1px solid var(--border); border-bottom:1px solid var(--border)">0.00</div>
                    <div id="bids" style="flex:1; overflow:hidden"></div>
                    
                    <div class="exec-bar">
                        <div style="background:var(--bg); padding:8px; border-radius:4px; display:flex; border: 1px solid var(--border)">
                            <input type="number" id="trade-qty" placeholder="0.00" style="background:transparent; border:none; color:#fff; flex:1; font-family:var(--font-mono); font-size:12px;">
                            <span id="trade-unit" style="font-size:9px; font-weight:900; align-self:center; color:var(--dim)">BTC</span>
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
                            <button class="btn btn-buy" onclick="exec('long')">BUY / LONG</button>
                            <button class="btn btn-sell" onclick="exec('short')">SELL / SHORT</button>
                        </div>
                    </div>
                </div>

                <div class="panel" style="grid-column: 1/3; border-top:1px solid var(--border)">
                    <div class="panel-h">Positions</div>
                    <div style="overflow-y:auto; flex:1">
                        <table>
                            <thead><tr><th>Pair</th><th>Side</th><th>Size</th><th>Entry</th><th>Mark</th><th>PNL</th><th>Action</th></tr></thead>
                            <tbody id="pos-table"></tbody>
                        </table>
                    </div>
                </div>

                <div class="panel" style="border-top:1px solid var(--border); border-left:1px solid var(--border)">
                    <div class="panel-h">Terminal Log</div>
                    <div id="trade-log" style="overflow-y:auto; flex:1; font-size:9px; font-family:var(--font-mono); color:var(--dim); padding:10px;"></div>
                </div>
            </div>
        </section>
        
        </div>

<script>
    let state = JSON.parse(localStorage.getItem('orion_v10')) || {
        wallet: 50000.00,
        positions: [],
        active: 'BTCUSDT',
        log: []
    };

    let prices = {};
    const assets = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT', 'XRPUSDT', 'LINKUSDT', 'PEPEUSDT'];
    let tvWidget = null;

    window.onload = () => {
        lucide.createIcons();
        initMarkets();
        setPair(state.active);
        startWS();
        setInterval(engine, 100);
        setInterval(() => {
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toISOString().split('T')[1].split('.')[0] + ' UTC';
        }, 1000);
    };

    function setPair(symbol) {
        state.active = symbol;
        document.querySelectorAll('.m-row').forEach(r => r.classList.remove('active'));
        const activeRow = document.getElementById('row-'+symbol);
        if(activeRow) activeRow.classList.add('active');
        
        document.getElementById('trade-unit').innerText = symbol.replace('USDT','');
        document.getElementById('h-pair').innerText = symbol.replace('USDT','') + ' / USDT';

        // Load Advanced TradingView Widget
        tvWidget = new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:" + symbol,
            "interval": "5",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#0a0c10",
            "enable_publishing": false,
            "hide_top_toolbar": false, // Show timeframe/tool controls
            "hide_legend": false,
            "withdateranges": true,
            "save_image": true,
            "container_id": "tv_frame",
            "drawings_access": { type: 'all', tools: [{ name: "Regression Trend" }] },
            "enabled_features": [
                "study_templates",
                "use_localstorage_for_settings_screens",
                "side_toolbar_in_fullscreen_mode",
                "header_saveload"
            ],
            "disabled_features": ["header_symbol_search"], // Customizing search
            "overrides": {
                "paneProperties.background": "#030406",
                "paneProperties.vertGridProperties.color": "rgba(255, 255, 255, 0.02)",
                "paneProperties.horzGridProperties.color": "rgba(255, 255, 255, 0.02)",
                "symbolWatermarkProperties.transparency": 90,
                "scalesProperties.textColor": "#707a8a"
            }
        });
        save();
    }

    // --- Core Systems ---
    function startWS() {
        const stream = assets.map(a => a.toLowerCase() + '@ticker').join('/');
        const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${stream}`);
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            prices[d.s] = parseFloat(d.c);
            updateMarketUI(d);
        };
    }

    function engine() {
        let upnl = 0;
        const tbody = document.getElementById('pos-table');
        if(!tbody) return;
        tbody.innerHTML = '';

        state.positions.forEach(p => {
            const mark = prices[p.sym] || p.entry;
            const diff = p.side === 'long' ? (mark - p.entry) * p.qty : (p.entry - mark) * p.qty;
            upnl += diff;

            tbody.innerHTML += `<tr>
                <td style="font-weight:700">${p.sym}</td>
                <td style="color:${p.side==='long'?'var(--pos)':'var(--neg)'}">${p.side.toUpperCase()}</td>
                <td>${p.qty}</td>
                <td>${p.entry.toFixed(2)}</td>
                <td>${mark.toFixed(2)}</td>
                <td style="color:${diff>=0?'var(--pos)':'var(--neg)'}">$${diff.toFixed(2)}</td>
                <td><button onclick="closePos(${p.id})" style="color:var(--dim); background:none; border:none; cursor:pointer; font-size:9px;">CLOSE</button></td>
            </tr>`;
        });
    }

    function initMarkets() {
        const list = document.getElementById('market-list');
        assets.forEach(a => {
            const div = document.createElement('div');
            div.className = `m-row`; 
            div.id = 'row-'+a;
            div.onclick = () => setPair(a);
            div.innerHTML = `<span>${a.replace('USDT','')}</span><div style="text-align:right"><div class="p-val">0.00</div><div class="p-chg" style="font-size:10px; color:var(--dim)">0%</div></div>`;
            list.appendChild(div);
        });
    }

    function updateMarketUI(d) {
        const row = document.getElementById('row-'+d.s);
        if(row) {
            row.querySelector('.p-val').innerText = parseFloat(d.c).toLocaleString();
            const chg = row.querySelector('.p-chg');
            chg.innerText = d.P + '%';
            chg.style.color = d.P >= 0 ? 'var(--pos)' : 'var(--neg)';
        }
        if(d.s === state.active) {
            document.getElementById('mid-price').innerText = parseFloat(d.c).toLocaleString();
            document.getElementById('h-change').innerText = d.P + '%';
            document.getElementById('h-change').style.color = d.P >= 0 ? 'var(--pos)' : 'var(--neg)';
            renderOB(parseFloat(d.c));
        }
    }

    function renderOB(p) {
        const ask = document.getElementById('asks'); const bid = document.getElementById('bids');
        if(!ask || !bid) return;
        ask.innerHTML = ''; bid.innerHTML = '';
        const spread = p * 0.0001;
        for(let i=11; i>=0; i--) {
            ask.innerHTML += `<div class="ob-row"><div class="ob-fill" style="width:${Math.random()*70}%; background:var(--neg)"></div><span style="color:var(--neg)">${(p + spread + (i*spread)).toFixed(2)}</span><span style="text-align:right">${(Math.random()*2).toFixed(3)}</span><span style="text-align:right; color:var(--dim)">${(Math.random()*50).toFixed(1)}K</span></div>`;
            bid.innerHTML += `<div class="ob-row"><div class="ob-fill" style="width:${Math.random()*70}%; background:var(--pos)"></div><span style="color:var(--pos)">${(p - spread - (i*spread)).toFixed(2)}</span><span style="text-align:right">${(Math.random()*2).toFixed(3)}</span><span style="text-align:right; color:var(--dim)">${(Math.random()*50).toFixed(1)}K</span></div>`;
        }
    }

    function exec(side) {
        const qty = parseFloat(document.getElementById('trade-qty').value);
        const price = prices[state.active];
        if(!qty || !price) return;
        state.positions.push({ id: Date.now(), sym: state.active, side, qty, entry: price });
        addLog(`ORDER FILLED: ${side.toUpperCase()} ${qty} ${state.active} @ ${price}`);
        save();
    }

    function closePos(id) {
        state.positions = state.positions.filter(x => x.id !== id);
        addLog(`POSITION CLOSED`);
        save();
    }

    function addLog(m) {
        const l = document.getElementById('trade-log');
        const entry = `<div><span style="color:var(--accent)">[${new Date().toLocaleTimeString()}]</span> ${m}</div>`;
        l.innerHTML = entry + l.innerHTML;
    }

    function showSection(id, el) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('view-'+id).classList.add('active');
        el.classList.add('active');
    }

    function save() { localStorage.setItem('orion_v10', JSON.stringify(state)); }
</script>
</body>
</html>
