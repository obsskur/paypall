<!DOCTYPE html>
<html>
<head>
    <title>PayPal Balance Generator</title>
    <style>
        body {
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .paypal-card {
            width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #0070ba;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
        }
        .balance-section {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .balance-label {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .balance-amount {
            font-size: 48px;
            font-weight: 300;
            color: #0070ba;
            margin: 10px 0;
        }
        .balance-currency {
            font-size: 24px;
            color: #666;
        }
        .account-info {
            padding: 20px;
            background: #f9f9f9;
            display: flex;
            justify-content: space-between;
        }
        .account-detail {
            text-align: left;
        }
        .detail-label {
            color: #888;
            font-size: 12px;
        }
        .detail-value {
            font-weight: 600;
            margin-top: 5px;
        }
        .actions {
            padding: 20px;
            display: flex;
            gap: 10px;
        }
        .button {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .button-primary {
            background: #0070ba;
            color: white;
        }
        .button-secondary {
            background: white;
            border: 1px solid #0070ba;
            color: #0070ba;
        }
        .controls {
            padding: 20px;
            background: #f0f0f0;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="paypal-card" id="paypalCard">
        <div class="header">
            <span class="logo">PayPal</span>
            <span style="flex:1"></span>
            <span>👤 John Doe</span>
        </div>
        
        <div class="balance-section">
            <div class="balance-label">Available Balance</div>
            <div class="balance-amount" id="balanceDisplay">$12,345.67</div>
            <div class="balance-currency">USD</div>
        </div>
        
        <div class="account-info">
            <div class="account-detail">
                <div class="detail-label">Email</div>
                <div class="detail-value" id="emailDisplay">user@example.com</div>
            </div>
            <div class="account-detail">
                <div class="detail-label">Member since</div>
                <div class="detail-value" id="sinceDisplay">2021</div>
            </div>
            <div class="account-detail">
                <div class="detail-label">Status</div>
                <div class="detail-value" id="statusDisplay">Verified</div>
            </div>
        </div>
        
        <div class="actions">
            <button class="button button-primary">Send</button>
            <button class="button button-secondary">Request</button>
        </div>
        
        <div class="controls">
            <h3>Customize (Your Eyes Only)</h3>
            <label>Balance: $<input type="text" id="balanceInput" value="12345.67"></label>
            <label>Email: <input type="text" id="emailInput" value="user@example.com"></label>
            <label>Since: <input type="text" id="sinceInput" value="2021"></label>
            <label>Status: <input type="text" id="statusInput" value="Verified"></label>
            <button onclick="updateDisplay()">Update</button>
        </div>
    </div>

    <script>
        function updateDisplay() {
            let balance = document.getElementById('balanceInput').value;
            let email = document.getElementById('emailInput').value;
            let since = document.getElementById('sinceInput').value;
            let status = document.getElementById('statusInput').value;
            
            // Format balance with commas
            let balanceParts = balance.split('.');
            balanceParts[0] = balanceParts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            let formattedBalance = '$' + balanceParts.join('.');
            
            document.getElementById('balanceDisplay').innerText = formattedBalance;
            document.getElementById('emailDisplay').innerText = email;
            document.getElementById('sinceDisplay').innerText = since;
            document.getElementById('statusDisplay').innerText = status;
        }
        
        // Initialize
        updateDisplay();
    </script>
</body>
</html>
