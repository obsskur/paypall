```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orion Crypto Portfolio</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#0b0d13;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:240px;
background:#121520;
padding:20px;
border-right:1px solid #23283a;
}

.logo{
font-size:18px;
font-weight:600;
margin-bottom:25px;
}

.menu button{
width:100%;
background:none;
border:none;
color:#9aa0b5;
text-align:left;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:6px;
}

.menu button:hover{
background:#1a1f30;
color:white;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
padding:18px 28px;
border-bottom:1px solid #23283a;
background:#10131d;
font-size:26px;
font-weight:700;
}

.content{
padding:25px;
overflow:auto;
}

.card{
background:#151a27;
border-radius:14px;
padding:20px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #23283a;
}

input{
background:#1a1f30;
border:none;
color:white;
padding:8px;
border-radius:6px;
}

button{
background:#2b324c;
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.hidden{
display:none;
}

.positive{color:#2ecc71;}
.negative{color:#e74c3c;}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">Orion Portfolio</div>

<div class="menu">
<button onclick="show('wallet')">Portfolio</button>
<button onclick="show('chart')">Charts</button>
<button onclick="show('market')">Top 500 Market</button>
<button onclick="show('gainers')">24h Movers</button>
<button onclick="show('alerts')">Price Alerts</button>
</div>

</div>

<div class="main">

<div class="topbar" id="portfolioValue">$0</div>

<div class="content">

<div id="wallet">

<div class="card">
<h3>Your Assets</h3>

<table>

<tr>
<th>Asset</th>
<th>Balance</th>
<th>Price</th>
<th>Value</th>
<th>P/L</th>
</tr>

<tr>
<td>Bitcoin</td>
<td id="btcBal">0.21</td>
<td id="btcPrice"></td>
<td id="btcVal"></td>
<td id="btcPL"></td>
</tr>

<tr>
<td>Ethereum</td>
<td id="ethBal">2.4</td>
<td id="ethPrice"></td>
<td id="ethVal"></td>
<td id="ethPL"></td>
</tr>

<tr>
<td>Solana</td>
<td id="solBal">18</td>
<td id="solPrice"></td>
<td id="solVal"></td>
<td id="solPL"></td>
</tr>

</table>

</div>

</div>

<div id="chart" class="hidden">

<div class="card">
<h3>Trading Chart</h3>
<div id="tradingview_chart" style="height:500px;"></div>
</div>

</div>

<div id="market" class="hidden">

<div class="card">

<h3>Top 500 Cryptocurrencies</h3>

<table id="marketTable">

<tr>
<th>Rank</th>
<th>Name</th>
<th>Price</th>
<th>24h</th>
</tr>

</table>

</div>

</div>

<div id="gainers" class="hidden">

<div class="card">

<h3>24h Gainers & Losers</h3>

<table id="gainerTable">

<tr>
<th>Name</th>
<th>Change</th>
</tr>

</table>

</div>

</div>

<div id="alerts" class="hidden">

<div class="card">

<h3>Price Alerts</h3>

<input id="alertCoin" placeholder="coin id (bitcoin)">
<input id="alertPrice" placeholder="target price">

<button onclick="addAlert()">Add Alert</button>

<ul id="alertList"></ul>

</div>

</div>

</div>

</div>

<script>

let balances={btc:0.21,eth:2.4,sol:18};

let prices={};

let buyPrices={
btc:40000,
eth:2000,
sol:60
};

let alerts=[];

function show(id){
document.querySelectorAll(".content > div").forEach(x=>x.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

async function loadPrices(){

let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd");

let d=await r.json();

prices.btc=d.bitcoin.usd;
prices.eth=d.ethereum.usd;
prices.sol=d.solana.usd;

updatePortfolio();

}

function updatePortfolio(){

let btcVal=balances.btc*prices.btc;
let ethVal=balances.eth*prices.eth;
let solVal=balances.sol*prices.sol;

document.getElementById("btcPrice").innerText="$"+prices.btc;
document.getElementById("ethPrice").innerText="$"+prices.eth;
document.getElementById("solPrice").innerText="$"+prices.sol;

document.getElementById("btcVal").innerText="$"+btcVal.toFixed(2);
document.getElementById("ethVal").innerText="$"+ethVal.toFixed(2);
document.getElementById("solVal").innerText="$"+solVal.toFixed(2);

let btcPL=(prices.btc-buyPrices.btc)*balances.btc;
let ethPL=(prices.eth-buyPrices.eth)*balances.eth;
let solPL=(prices.sol-buyPrices.sol)*balances.sol;

setPL("btcPL",btcPL);
setPL("ethPL",ethPL);
setPL("solPL",solPL);

let total=btcVal+ethVal+solVal;

document.getElementById("portfolioValue").innerText="$"+total.toFixed(2);

checkAlerts();

}

function setPL(id,val){

let el=document.getElementById(id);

el.innerText="$"+val.toFixed(2);

el.className=val>=0?"positive":"negative";

}

async function loadMarket(){

let r=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=500&page=1");

let d=await r.json();

let table=document.getElementById("marketTable");

d.forEach(c=>{

let row=document.createElement("tr");

row.innerHTML=`
<td>${c.market_cap_rank}</td>
<td>${c.name}</td>
<td>$${c.current_price}</td>
<td class="${c.price_change_percentage_24h>0?"positive":"negative"}">
${c.price_change_percentage_24h.toFixed(2)}%
</td>
`;

table.appendChild(row);

});

loadMovers(d);

}

function loadMovers(data){

let sorted=[...data].sort((a,b)=>b.price_change_percentage_24h-a.price_change_percentage_24h);

let top=[...sorted.slice(0,10),...sorted.slice(-10)];

let table=document.getElementById("gainerTable");

top.forEach(c=>{

let row=document.createElement("tr");

row.innerHTML=`
<td>${c.name}</td>
<td class="${c.price_change_percentage_24h>0?"positive":"negative"}">
${c.price_change_percentage_24h.toFixed(2)}%
</td>
`;

table.appendChild(row);

});

}

function addAlert(){

let coin=document.getElementById("alertCoin").value;
let price=parseFloat(document.getElementById("alertPrice").value);

alerts.push({coin,price});

let li=document.createElement("li");

li.innerText=coin+" → $"+price;

document.getElementById("alertList").appendChild(li);

}

function checkAlerts(){

alerts.forEach(a=>{

if(prices[a.coin.substring(0,3)]>=a.price){

alert(a.coin+" reached $"+a.price);

}

});

}

new TradingView.widget({
container_id:"tradingview_chart",
width:"100%",
height:500,
symbol:"BINANCE:BTCUSDT",
interval:"60",
theme:"dark",
style:"1"
});

loadPrices();
loadMarket();

setInterval(loadPrices,30000);

</script>

</body>
</html>
